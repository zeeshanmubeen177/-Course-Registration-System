<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Registration System | Course Details</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <a href="courses.html" style="display:inline-block;margin-bottom:16px;">&larr; Back to courses</a>
    <div id="detail">
      <div class="loading"><div class="spinner"></div>Loading course…</div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    renderNavbar("courses.html");
    renderFooter();

    const courseId = qs("id");
    const box = document.getElementById("detail");

    async function loadCourse() {
      if (!courseId) { box.innerHTML = `<div class="card empty">No course selected.</div>`; return; }
      try {
        const c = await api(`/courses/${courseId}`);
        const seat = c.available_seats > 0
          ? `<span class="badge green">${c.available_seats} seats available</span>`
          : `<span class="badge red">Course full</span>`;
        const enroll = Session.isLoggedIn()
          ? `<button class="btn success" ${c.available_seats <= 0 ? "disabled" : ""} onclick="enroll(${c.course_id})">Enroll in this Course</button>`
          : `<a href="login.html" class="btn success">Login to Enroll</a>`;

        box.innerHTML = `
          <div class="card">
            <h1 class="page-title">${escapeHtml(c.course_name)}</h1>
            <div class="course-meta" style="margin:14px 0;">
              <span class="badge">${escapeHtml(c.instructor || "TBA")}</span>
              <span class="badge gray">${c.credit_hours} credit hours</span>
              ${seat}
            </div>
            <div class="profile-row"><span>Course ID</span><span>#${c.course_id}</span></div>
            <div class="profile-row"><span>Course Name</span><span>${escapeHtml(c.course_name)}</span></div>
            <div class="profile-row"><span>Instructor</span><span>${escapeHtml(c.instructor || "To be announced")}</span></div>
            <div class="profile-row"><span>Credit Hours</span><span>${c.credit_hours}</span></div>
            <div class="profile-row" style="border-bottom:none;"><span>Available Seats</span><span>${c.available_seats}</span></div>
            <div style="margin-top:20px;">${enroll}</div>
          </div>`;
      } catch (e) {
        box.innerHTML = `<div class="card empty"><div class="icon">&#9888;</div>${escapeHtml(e.message)}</div>`;
      }
    }

    async function enroll(id) {
      const me = Session.student();
      try {
        await api("/enroll", { method: "POST", auth: true, body: { student_id: me.student_id, course_id: id } });
        toast("Enrolled successfully!", "success");
        loadCourse();
      } catch (e) { toast(e.message, "error"); }
    }

    loadCourse();
  </script>
</body>
</html>
