<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Registration System | Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="page-sub">Manage courses, students and registrations.</p>

    <!-- Stats -->
    <div class="grid grid-4" style="margin-bottom:30px;">
      <div class="card stat"><div class="num" id="sCourses">—</div><div class="label">Courses</div></div>
      <div class="card stat"><div class="num" id="sStudents">—</div><div class="label">Students</div></div>
      <div class="card stat"><div class="num" id="sRegs">—</div><div class="label">Registrations</div></div>
      <div class="card stat"><div class="num" id="sSeats">—</div><div class="label">Seats Available</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="courses">Courses</div>
      <div class="tab" data-tab="students">Students</div>
      <div class="tab" data-tab="registrations">Registrations</div>
    </div>

    <!-- COURSES TAB -->
    <div id="tab-courses">
      <div class="section-head">
        <h2 class="page-title" style="font-size:1.3rem;">Manage Courses</h2>
        <button class="btn success" id="addCourseBtn">+ Add Course</button>
      </div>
      <div id="adminCourses"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- STUDENTS TAB -->
    <div id="tab-students" style="display:none;">
      <h2 class="page-title" style="font-size:1.3rem;">All Students</h2>
      <div id="adminStudents"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- REGISTRATIONS TAB -->
    <div id="tab-registrations" style="display:none;">
      <h2 class="page-title" style="font-size:1.3rem;">All Registrations</h2>
      <div id="adminRegs"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>

  <!-- Course modal -->
  <div class="modal-overlay" id="courseModal">
    <div class="modal">
      <h3 id="modalTitle">Add Course</h3>
      <div class="alert error" id="modalAlert"></div>
      <input type="hidden" id="courseId" />
      <div class="form-group">
        <label for="cName">Course Name</label>
        <input type="text" id="cName" />
      </div>
      <div class="form-group">
        <label for="cInstructor">Instructor</label>
        <input type="text" id="cInstructor" />
      </div>
      <div class="form-group">
        <label for="cCredits">Credit Hours</label>
        <input type="number" id="cCredits" min="1" max="12" value="3" />
      </div>
      <div class="form-group">
        <label for="cSeats">Available Seats</label>
        <input type="number" id="cSeats" min="0" max="1000" value="30" />
      </div>
      <div class="modal-actions">
        <button class="btn outline" id="cancelModal">Cancel</button>
        <button class="btn success" id="saveCourse">Save</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    renderNavbar("admin.html");
    renderFooter();
    if (!requireAdmin()) { }

    /* ---------------- Tabs ---------------- */
    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        ["courses", "students", "registrations"].forEach((name) => {
          document.getElementById("tab-" + name).style.display = name === t.dataset.tab ? "block" : "none";
        });
      });
    });

    /* ---------------- Stats ---------------- */
    async function loadStats() {
      try {
        const s = await api("/dashboard");
        sCourses.textContent = s.total_courses;
        sStudents.textContent = s.total_students;
        sRegs.textContent = s.total_registrations;
        sSeats.textContent = s.total_seats_available;
      } catch (e) { /* ignore */ }
    }

    /* ---------------- Courses ---------------- */
    async function loadCourses() {
      const box = document.getElementById("adminCourses");
      try {
        const courses = await api("/courses");
        if (courses.length === 0) { box.innerHTML = `<div class="card empty">No courses yet.</div>`; return; }
        box.innerHTML = `
          <div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>Course</th><th>Instructor</th><th>Credits</th><th>Seats</th><th>Actions</th></tr></thead>
            <tbody>${courses.map((c) => `
              <tr>
                <td>${c.course_id}</td>
                <td>${escapeHtml(c.course_name)}</td>
                <td>${escapeHtml(c.instructor || "TBA")}</td>
                <td>${c.credit_hours}</td>
                <td>${c.available_seats}</td>
                <td>
                  <button class="btn sm" onclick='editCourse(${JSON.stringify(c)})'>Edit</button>
                  <button class="btn sm danger" onclick="deleteCourse(${c.course_id})">Delete</button>
                </td>
              </tr>`).join("")}</tbody>
          </table></div>`;
      } catch (e) { box.innerHTML = `<div class="card empty">${escapeHtml(e.message)}</div>`; }
    }

    /* ---------------- Students ---------------- */
    async function loadStudents() {
      const box = document.getElementById("adminStudents");
      try {
        const students = await api("/students", { auth: true });
        box.innerHTML = `
          <div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody>${students.map((s) => `
              <tr>
                <td>${s.student_id}</td>
                <td>${escapeHtml(s.name)}</td>
                <td>${escapeHtml(s.email)}</td>
                <td>${escapeHtml(s.department || "—")}</td>
                <td><span class="badge ${s.role === "admin" ? "" : "gray"}">${s.role}</span></td>
                <td>${s.role === "admin" ? "—" : `<button class="btn sm danger" onclick="deleteStudent(${s.student_id})">Delete</button>`}</td>
              </tr>`).join("")}</tbody>
          </table></div>`;
      } catch (e) { box.innerHTML = `<div class="card empty">${escapeHtml(e.message)}</div>`; }
    }

    /* ---------------- Registrations ---------------- */
    async function loadRegs() {
      const box = document.getElementById("adminRegs");
      try {
        const regs = await api("/registrations", { auth: true });
        if (regs.length === 0) { box.innerHTML = `<div class="card empty">No registrations yet.</div>`; return; }
        box.innerHTML = `
          <div class="table-wrap"><table>
            <thead><tr><th>Reg ID</th><th>Student</th><th>Course</th><th>Instructor</th><th>Date</th></tr></thead>
            <tbody>${regs.map((r) => `
              <tr>
                <td>${r.registration_id}</td>
                <td>${escapeHtml(r.student_name || "#" + r.student_id)}</td>
                <td>${escapeHtml(r.course_name || "#" + r.course_id)}</td>
                <td>${escapeHtml(r.instructor || "TBA")}</td>
                <td>${r.registration_date}</td>
              </tr>`).join("")}</tbody>
          </table></div>`;
      } catch (e) { box.innerHTML = `<div class="card empty">${escapeHtml(e.message)}</div>`; }
    }

    /* ---------------- Course modal ---------------- */
    const modal = document.getElementById("courseModal");
    const modalAlert = document.getElementById("modalAlert");

    function openModal(title) {
      document.getElementById("modalTitle").textContent = title;
      modalAlert.classList.remove("show");
      modal.classList.add("show");
    }
    function closeModal() { modal.classList.remove("show"); }

    document.getElementById("addCourseBtn").addEventListener("click", () => {
      document.getElementById("courseId").value = "";
      document.getElementById("cName").value = "";
      document.getElementById("cInstructor").value = "";
      document.getElementById("cCredits").value = 3;
      document.getElementById("cSeats").value = 30;
      openModal("Add Course");
    });

    function editCourse(c) {
      document.getElementById("courseId").value = c.course_id;
      document.getElementById("cName").value = c.course_name;
      document.getElementById("cInstructor").value = c.instructor || "";
      document.getElementById("cCredits").value = c.credit_hours;
      document.getElementById("cSeats").value = c.available_seats;
      openModal("Edit Course");
    }

    document.getElementById("cancelModal").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

    document.getElementById("saveCourse").addEventListener("click", async () => {
      modalAlert.classList.remove("show");
      const id = document.getElementById("courseId").value;
      const body = {
        course_name: document.getElementById("cName").value.trim(),
        instructor: document.getElementById("cInstructor").value.trim(),
        credit_hours: parseInt(document.getElementById("cCredits").value, 10),
        available_seats: parseInt(document.getElementById("cSeats").value, 10),
      };
      if (!body.course_name) { modalAlert.textContent = "Course name is required."; modalAlert.classList.add("show"); return; }
      try {
        if (id) {
          await api(`/courses/${id}`, { method: "PUT", auth: true, body });
          toast("Course updated.", "success");
        } else {
          await api("/courses", { method: "POST", auth: true, body });
          toast("Course added.", "success");
        }
        closeModal();
        loadCourses(); loadStats();
      } catch (e) { modalAlert.textContent = e.message; modalAlert.classList.add("show"); }
    });

    async function deleteCourse(id) {
      if (!confirm("Delete this course? All its registrations will be removed.")) return;
      try {
        await api(`/courses/${id}`, { method: "DELETE", auth: true });
        toast("Course deleted.", "success");
        loadCourses(); loadStats(); loadRegs();
      } catch (e) { toast(e.message, "error"); }
    }

    async function deleteStudent(id) {
      if (!confirm("Delete this student and all their registrations?")) return;
      try {
        await api(`/students/${id}`, { method: "DELETE", auth: true });
        toast("Student deleted.", "success");
        loadStudents(); loadStats(); loadRegs();
      } catch (e) { toast(e.message, "error"); }
    }

    loadStats(); loadCourses(); loadStudents(); loadRegs();
  </script>
</body>
</html>
