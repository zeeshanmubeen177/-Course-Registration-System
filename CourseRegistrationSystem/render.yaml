# Render deployment configuration for the FastAPI backend.
services:
  - type: web
    name: course-registration-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false   # set your Supabase connection string in the dashboard
      - key: SECRET_KEY
        generateValue: true
